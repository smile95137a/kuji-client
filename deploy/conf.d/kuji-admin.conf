# ============================================
# kuji-admin - 管理後台
# URL: http://18.179.187.129/kuji/
# 靜態檔案路徑: /var/www/kuji-admin/
# ============================================

# 管理後台
location /kuji/ {
    alias /var/www/kuji-admin/;
    index index.html;
    try_files $uri $uri/ /kuji/index.html;
    add_header Cache-Control "no-store";
}

# /kuji 不帶斜線時重導
location = /kuji {
    return 301 /kuji/;
}

# ============================================
# kuji-client - 前台官網
# URL: http://18.179.187.129/client/
# 靜態檔案路徑: /var/www/kuji-client/
# ============================================

# 前台官網
location /client/ {
    alias /var/www/kuji-client/;
    index index.html;
    try_files $uri $uri/ /client/index.html;
    add_header Cache-Control "no-store";
}

# /client 不帶斜線時重導
location = /client {
    return 301 /client/;
}
